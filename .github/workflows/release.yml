name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force a release even if the tag already exists"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Read and gate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      should_release: ${{ steps.gate.outputs.should_release }}
      release_body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Read versions
        id: read
        shell: bash
        run: |
          set -euo pipefail
          tauri_version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          pkg_version=$(node -p "require('./package.json').version")
          cargo_version=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tauri.conf.json: $tauri_version"
          echo "package.json:    $pkg_version"
          echo "Cargo.toml:      $cargo_version"
          if [ "$tauri_version" != "$pkg_version" ] || [ "$tauri_version" != "$cargo_version" ]; then
            echo "::error::Version mismatch across tauri.conf.json, package.json, Cargo.toml"
            exit 1
          fi
          echo "version=$tauri_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$tauri_version" >> "$GITHUB_OUTPUT"

      - name: Gate against existing tag
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.read.outputs.tag }}"
          force="${{ github.event.inputs.force }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            if [ "$force" = "true" ]; then
              echo "Tag $tag exists but force=true, releasing anyway."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $tag already exists. Skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Tag $tag does not exist. Releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.read.outputs.version }}"
          body=$(awk -v v="$version" '
            /^## \[/ {
              if (in_block) { exit }
              if ($0 ~ "^## \\[" v "\\]") { in_block = 1; next }
              next
            }
            in_block { print }
          ' CHANGELOG.md | sed -e ':a' -e '/./,$!d;/^$/N;/\n$/ba')
          if [ -z "$body" ]; then
            body="Release v$version. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## JLab Desktop v$version"
            echo
            echo "$body"
            echo
            echo "---"
            echo
            echo "Full history: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS (universal)
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload (macOS)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "JLab Desktop ${{ needs.version.outputs.tag }}"
          releaseBody: ${{ needs.version.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

  build-windows:
    name: Build Windows (NSIS + MSI)
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload (Windows)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "JLab Desktop ${{ needs.version.outputs.tag }}"
          releaseBody: ${{ needs.version.outputs.release_body }}
          releaseDraft: false
          prerelease: false
